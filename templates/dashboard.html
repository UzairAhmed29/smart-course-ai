{% extends "base.html" %}

{% block title %}Dashboard - Smart Course AI{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar p-4">
            <h5 class="fw-bold mb-4"><i class="bi bi-clock-history me-2"></i>Search History</h5>
            <div id="historyContent" class="list-group list-group-flush">
            </div>
        </div>

        <main class="col-md-9 p-4">

            <!-- Statistics Cards -->
            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm bg-primary text-white h-100 rounded-4">
                        <div class="card-body d-flex align-items-center p-4">
                            <div class="fs-1 me-4 opacity-50"><i class="bi bi-search"></i></div>
                            <div>
                                <h6 class="text-uppercase fw-bold mb-1 opacity-75" style="letter-spacing: 1px;">Total
                                    Searches</h6>
                                <h2 class="mb-0 fw-bold display-6" id="totalSearches">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm bg-success text-white h-100 rounded-4">
                        <div class="card-body d-flex align-items-center p-4">
                            <div class="fs-1 me-4 opacity-50"><i class="bi bi-bookmark-star-fill"></i></div>
                            <div>
                                <h6 class="text-uppercase fw-bold mb-1 opacity-75" style="letter-spacing: 1px;">Saved
                                    Courses</h6>
                                <h2 class="mb-0 fw-bold display-6" id="totalSaved">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm bg-info text-white h-100 rounded-4">
                        <div class="card-body d-flex align-items-center p-4">
                            <div class="fs-1 me-4 opacity-50"><i class="bi bi-lightning-charge-fill"></i></div>
                            <div>
                                <h6 class="text-uppercase fw-bold mb-1 opacity-75" style="letter-spacing: 1px;">Recent
                                    Activity</h6>
                                <h2 class="mb-0 fw-bold display-6" id="recentSearches">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


            <div id="savedContent"></div>
        </main>
    </div>
</div>
{% endblock %}
